# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json
customCommands:
  - key: '<c-n>'
    context: 'status'
    description: 'New sprint branch from dev-main'
    prompts:
      - type: 'menu'
        title: 'Sprint branch type'
        key: 'BranchType'
        options:
          - value: 'feat'
            name: 'feat'
            description: 'feature work'
            key: 'f'
          - value: 'fix'
            name: 'fix'
            description: 'bug fix or regression'
            key: 'x'
          - value: 'chore'
            name: 'chore'
            description: 'tooling or maintenance'
            key: 'c'
          - value: 'docs'
            name: 'docs'
            description: 'documentation work'
            key: 'd'
      - type: 'input'
        title: 'Sprint branch slug'
        key: 'BranchSlug'
        initialValue: ''
    command: './scripts/git/new-sprint {{.Form.BranchType | quote}} {{.Form.BranchSlug | quote}}'
    loadingText: 'Creating sprint branch'
    output: terminal
  - key: '<c-a>'
    context: 'status'
    description: 'Spawn agent worktree from current sprint branch'
    prompts:
      - type: 'input'
        title: 'Agent slice'
        key: 'Slice'
        initialValue: ''
    command: './scripts/git/spawn-agent {{.Form.Slice | quote}}'
    loadingText: 'Creating agent worktree'
    output: terminal
  - key: '<c-i>'
    context: 'status'
    description: 'Squash integrate agent branch into current sprint branch'
    prompts:
      - type: 'input'
        title: 'Agent slice'
        key: 'Slice'
        initialValue: ''
    command: './scripts/git/integrate-agent {{.Form.Slice | quote}}'
    loadingText: 'Squash integrating agent branch'
    output: terminal
    after:
      checkForConflicts: true
  - key: '<c-x>'
    context: 'status'
    description: 'Clean up an agent worktree and local branch'
    prompts:
      - type: 'input'
        title: 'Agent slice'
        key: 'Slice'
        initialValue: ''
      - type: 'menu'
        title: 'Cleanup mode'
        key: 'ForceFlag'
        options:
          - value: ''
            name: 'safe'
            description: 'fail if the worktree is dirty'
            key: 's'
          - value: '--force'
            name: 'force'
            description: 'force remove a dirty worktree'
            key: 'f'
    command: './scripts/git/cleanup-agent {{.Form.ForceFlag}} {{.Form.Slice | quote}}'
    loadingText: 'Cleaning agent worktree'
    output: terminal
